<html lang="en">
<head>

  <title>Motius SMPL comparison</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://huggingface.co" crossorigin>
  <link rel="preload" href="manifest.json" as="fetch" crossorigin="anonymous">
  <style>
    :root{color-scheme:light;--ink:#15201c;--muted:#66736d;--line:#d7dfdb;--paper:#fff;--wash:#eef2f0;--accent:#087d72;--header:72px}
    *{box-sizing:border-box}html,body{height:100%;margin:0}body{overflow:hidden;color:var(--ink);background:var(--wash);font:14px/1.45 ui-sans-serif,system-ui,sans-serif;letter-spacing:0}
    button,input,select{font:inherit;letter-spacing:0}.app{height:100%;display:grid;grid-template-rows:var(--header) minmax(0,1fr)}
    .topbar{display:grid;grid-template-columns:minmax(260px,1fr) auto auto minmax(190px,auto) minmax(300px,auto);gap:10px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--paper)}
    .search,input,select,.icon{height:38px;border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--ink)}input,select{width:100%;padding:0 11px}.icon{width:38px;display:grid;place-items:center;cursor:pointer;font-size:17px}.icon:hover{border-color:var(--accent);color:var(--accent)}

    @media(max-width:1100px){:root{--header:126px}.topbar{grid-template-columns:minmax(0,1fr) auto auto minmax(180px,auto)}.playback{grid-column:1/-1;grid-template-columns:38px minmax(0,1fr) 76px}}
    @media(max-width:820px){.workspace{grid-template-columns:1fr}.case-panel{display:none}.gallery{grid-template-columns:1fr}.tile{height:340px}.case-head{position:relative}}
  </style>

</head>
<body>
  <div class="app">
    <header class="topbar">

      <button class="icon" id="next" type="button" title="Next case" aria-label="Next case">›</button>
      <select id="case-select" aria-label="Selected case"></select>
      <div class="playback">
        <button class="icon" id="play" type="button" title="Play or pause" aria-label="Play or pause">Ⅱ</button>
        <input id="timeline" type="range" min="0" max="1" value="0" aria-label="Animation frame">
        <span class="frame" id="frame">0 / 0</span>
      </div>
    </header>
    <div class="workspace">
      <aside class="case-panel"><div class="case-summary" id="case-summary">Loading cases</div><div class="case-list" id="case-list"></div></aside>
      <main class="main" id="main">
        <section class="case-head"><div><div class="eyebrow" id="position">Complete evaluation population</div><h1 id="case-id">Loading</h1><div class="captions" id="captions"></div><div class="condition-legend" id="condition-legend"></div></div><div class="loading" id="loading">Loading SMPL motions</div></section>
        <div class="gallery-wrap"><div class="gallery" id="gallery"><canvas class="render-canvas" id="canvas"></canvas></div></div>
      </main>
    </div>
  </div>
  <script type="module">
    import * as THREE from "three";

    const assetCache=new Map(),descriptorChunkCache=new Map(),SMPL_NAMES=["Pelvis","L_Hip","R_Hip","Spine1","L_Knee","R_Knee","Spine2","L_Ankle","R_Ankle","Spine3","L_Foot","R_Foot","Neck","L_Collar","R_Collar","Head","L_Shoulder","R_Shoulder","L_Elbow","R_Elbow","L_Wrist","R_Wrist","L_Hand","R_Hand"];let manifest,body,filtered=[],selected=0,views=[],frame=0,playing=true,lastTime=0,maxFrames=1,loadGeneration=0,currentItem=null;

    function url(path,base){return new URL(path,base?new URL(base,location.href):location.href).href}
    async function fetchBuffer(path){if(assetCache.has(path)){const hit=assetCache.get(path);assetCache.delete(path);assetCache.set(path,hit);return hit}const pending=fetch(path,{cache:"force-cache"}).then(r=>{if(!r.ok)throw new Error(`${r.status} ${path}`);return r.arrayBuffer()});assetCache.set(path,pending);while(assetCache.size>96)assetCache.delete(assetCache.keys().next().value);return pending}
    async function loadBody(){const base=url(manifest.body_model_url||"smpl_model/",location.href);const meta=await fetch(url("model.json",base)).then(r=>r.json());const files=meta.files;const [vb,jb,fb,ib,wb]=await Promise.all([files.vertices,files.joints,files.faces,files.skin_indices,files.skin_weights].map(name=>fetchBuffer(url(name,base))));const positions=new Float32Array(vb),joints=new Float32Array(jb),faces=new Uint16Array(fb),indices=new Uint8Array(ib),weights=new Uint16Array(wb);const geometry=new THREE.BufferGeometry();geometry.setAttribute("position",new THREE.BufferAttribute(positions,3));geometry.setAttribute("skinIndex",new THREE.Uint8BufferAttribute(indices,4));geometry.setAttribute("skinWeight",new THREE.Uint16BufferAttribute(weights,4,true));geometry.setIndex(new THREE.BufferAttribute(faces,1));geometry.computeVertexNormals();return{meta,geometry,joints,parents:meta.parents}}
    function buildSkinnedMesh(material){const bones=[];for(let i=0;i<body.meta.joints;i++){const bone=new THREE.Bone(),p=body.parents[i],j=i*3;bone.name=`SMPL_${SMPL_NAMES[i]||i}`;if(p<0)bone.position.set(body.joints[j],body.joints[j+1],body.joints[j+2]);else{const q=p*3;bone.position.set(body.joints[j]-body.joints[q],body.joints[j+1]-body.joints[q+1],body.joints[j+2]-body.joints[q+2])}bones.push(bone)}for(let i=1;i<bones.length;i++)bones[body.parents[i]].add(bones[i]);const mesh=new THREE.SkinnedMesh(body.geometry,material);mesh.name="SMPL_Neutral";mesh.add(bones[0]);const skeleton=new THREE.Skeleton(bones);mesh.bind(skeleton);mesh.frustumCulled=false;mesh.castShadow=true;mesh.receiveShadow=true;return{mesh,bones}}
    function makeView(method,index){const scene=new THREE.Scene();scene.background=new THREE.Color(index%2?0xf1f4f2:0xeef2f0);scene.fog=new THREE.Fog(scene.background,7,16);scene.add(new THREE.HemisphereLight(0xffffff,0x66746e,2.1));const key=new THREE.DirectionalLight(0xffffff,2.8);key.position.set(3,6,4);key.castShadow=true;scene.add(key);const floor=new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.MeshStandardMaterial({color:0xf8faf9,roughness:1}));floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);const grid=new THREE.GridHelper(20,40,0xa8b6af,0xd8dfdb);grid.position.y=.003;scene.add(grid);const material=new THREE.MeshStandardMaterial({color:method.accent||"#2e78ad",roughness:.58,metalness:.02});const skinned=buildSkinnedMesh(material);scene.add(skinned.mesh);const camera=new THREE.PerspectiveCamera(38,1,.05,60);camera.position.set(2.55,2.15,4.05);camera.lookAt(0,.85,0);return{method,scene,camera,...skinned,motion:null,viewport:null,groundOffset:0}}

    async function ensureCaseMotions(index){const item=manifest.cases[index];if(item.motions)return item;const spec=manifest.case_descriptor_chunks;if(!spec)throw new Error(`No motion descriptors for case ${item.case_id}`);const chunk=Math.floor(index/spec.size),key=String(chunk).padStart(3,"0");let pending=descriptorChunkCache.get(key);if(!pending){const path=spec.path.replace("{chunk}",key),source=url(path,spec.base_url?url(spec.base_url,location.href):location.href);pending=fetch(source,{cache:"force-cache"}).then(response=>{if(!response.ok)throw new Error(`Descriptor chunk ${response.status}`);return response.json()});descriptorChunkCache.set(key,pending)}const payload=await pending;payload.motions.forEach((motions,offset)=>{const target=manifest.cases[payload.start+offset];if(target)target.motions=motions});return manifest.cases[index]}
    function prefetchCaseMotions(index){if(index<0||index>=manifest.cases.length)return;ensureCaseMotions(index).catch(error=>console.debug("Descriptor prefetch failed",error))}
    function rot6dQuaternion(values,base,out){const a1=new THREE.Vector3(values[base],values[base+2],values[base+4]);if(a1.lengthSq()<1e-10)a1.set(1,0,0);else a1.normalize();const a2=new THREE.Vector3(values[base+1],values[base+3],values[base+5]);a2.addScaledVector(a1,-a1.dot(a2));if(a2.lengthSq()<1e-10){a2.set(0,1,0);if(Math.abs(a1.y)>.9)a2.set(0,0,1);a2.addScaledVector(a1,-a1.dot(a2))}a2.normalize();const a3=new THREE.Vector3().crossVectors(a1,a2).normalize();const matrix=new THREE.Matrix4().set(a1.x,a2.x,a3.x,0,a1.y,a2.y,a3.y,0,a1.z,a2.z,a3.z,0,0,0,0,1);out.setFromRotationMatrix(matrix)}

    function updateView(view){if(!view.motion)return;const values=setPose(view,frame),conditioned=isConditionFrame(currentItem,frame),conditionColor=manifest.condition_legend?.conditioned?.color||"#d95f02";view.mesh.material.color.set(conditioned?conditionColor:(view.method.accent||"#2e78ad"));if(view.tile)view.tile.dataset.frameKind=conditioned?"condition":"generated";view.camera.position.set(values[0]+2.55,2.15,values[2]+4.05);view.camera.lookAt(values[0],.85,values[2])}
    function resizeRenderer(){const width=gallery.clientWidth,height=gallery.clientHeight,dpr=renderer.getPixelRatio();if(canvas.width!==Math.round(width*dpr)||canvas.height!==Math.round(height*dpr))renderer.setSize(width,height,false)}
    function renderViews(){resizeRenderer();renderer.setScissorTest(true);const canvasRect=canvas.getBoundingClientRect();renderer.clear();for(const view of views){if(!view.viewport)continue;const rect=view.viewport.getBoundingClientRect(),left=rect.left-canvasRect.left,bottom=canvasRect.bottom-rect.bottom,width=rect.width,height=rect.height;if(rect.bottom<0||rect.top>innerHeight||width<=0||height<=0)continue;renderer.setViewport(left,bottom,width,height);renderer.setScissor(left,bottom,width,height);view.camera.aspect=width/height;view.camera.updateProjectionMatrix();renderer.render(view.scene,view.camera)}renderer.setScissorTest(false)}

    async function downloadView(view,item,format,button){if(!view.motion)return;const old=button.textContent;button.disabled=true;button.textContent="…";try{await new Promise(resolve=>requestAnimationFrame(resolve));if(format==="npz")await exportNpz(view,item);else await exportFbx(view,item)}catch(error){console.error(error);alert(`Export failed: ${error.message}`)}finally{button.disabled=false;button.textContent=old}}
    function renderTiles(item){gallery.querySelectorAll(".tile").forEach(node=>node.remove());views=manifest.motion_methods.map((method,index)=>makeView(method,index));for(const view of views){const tile=document.createElement("article");tile.className="tile";tile.innerHTML=`<div class="tile-head"><div class="method"><span class="swatch" style="background:${view.method.accent}"></span>${view.method.label}</div><div class="tile-actions"><button class="download" data-format="npz" disabled>NPZ</button><button class="download" data-format="fbx" disabled>FBX</button></div></div><div class="viewport"></div>`;for(const button of tile.querySelectorAll(".download"))button.addEventListener("click",event=>{event.stopPropagation();downloadView(view,item,button.dataset.format,button)});const output=item.outputs?.[view.method.key];if(output){const text=document.createElement("div");text.className="output-text";text.textContent=output;tile.append(text)}gallery.append(tile);view.viewport=tile.querySelector(".viewport");view.tile=tile}for(const method of manifest.output_methods||[]){const tile=document.createElement("article");tile.className="tile text-tile";tile.innerHTML=`<div class="tile-head"><div class="method"><span class="swatch" style="background:${method.accent}"></span>${method.label}</div></div><div class="text-result"></div>`;tile.querySelector(".text-result").textContent=item.outputs?.[method.key]||"No output";gallery.append(tile)}}
    function referenceValues(item){return item.segments||item.references||[]}
    function renderCaseMeta(item,index){$("#position").textContent=`Case ${index+1} of ${manifest.population}`;$("#case-id").textContent=item.sample_id||item.case_id;const refs=referenceValues(item);$("#captions").replaceChildren(...refs.map(value=>{const span=document.createElement("span");span.className="caption";span.textContent=typeof value==="string"?value:value.caption;if(typeof value!=="string"){span.dataset.start=value.start_frame;span.dataset.end=value.end_frame}return span}));const legend=$("#condition-legend");if(item.condition_intervals?.length){const condition=manifest.condition_legend?.conditioned||{label:"Condition frame",color:"#d95f02"},generated=manifest.condition_legend?.generated||{label:"Generated frame"};legend.replaceChildren(...[[condition.label,condition.color],[generated.label,"#66736d"]].map(([label,color])=>{const chip=document.createElement("span");chip.className="legend-chip";chip.innerHTML=`<span class="legend-dot" style="background:${color}"></span>`;chip.append(document.createTextNode(label));return chip}))}else legend.replaceChildren()}
    function idle(){return new Promise(resolve=>"requestIdleCallback"in globalThis?requestIdleCallback(()=>resolve(),{timeout:500}):setTimeout(resolve,0))}
    async function choose(index){if(!filtered.length)return;const generation=++loadGeneration;selected=Math.max(0,Math.min(index,filtered.length-1));const absolute=filtered[selected];loading.hidden=false;loading.textContent="Loading case metadata";const item=await ensureCaseMotions(absolute);if(generation!==loadGeneration)return;currentItem=item;$("#case-select").value=String(absolute);document.querySelectorAll(".case-button").forEach(button=>button.classList.toggle("active",Number(button.dataset.index)===absolute));renderCaseMeta(item,absolute);renderTiles(item);maxFrames=Math.max(1,...Object.values(item.motions).map(descriptor=>descriptor.display_frames||1));frame=0;$("#timeline").max=maxFrames-1;loading.textContent=`Loading 0 / ${views.length}`;let done=0;const hydrate=async view=>{const descriptor=item.motions[view.method.key];if(!descriptor)return;await loadViewMotion(view,descriptor);if(generation!==loadGeneration)return;computeGroundOffset(view);view.tile.querySelectorAll(".download").forEach(button=>button.disabled=false);done++;loading.textContent=`Loading ${done} / ${views.length}`};const columns=Math.max(1,Math.floor((gallery.clientWidth+12)/282)),eager=Math.min(views.length,columns);await Promise.all(views.slice(0,eager).map(hydrate));if(generation!==loadGeneration)return;loading.hidden=true;updateAll();history.replaceState(null,"",`?case=${encodeURIComponent(item.case_key||item.case_id)}`);const step=manifest.case_descriptor_chunks?.size||1;prefetchCaseMotions(absolute+step);void(async()=>{for(let start=eager;start<views.length;start+=columns){await idle();await Promise.all(views.slice(start,start+columns).map(hydrate));if(generation!==loadGeneration)return;updateAll()}})()}
    function updateAll(){for(const view of views)updateView(view);$("#timeline").value=frame;$("#frame").textContent=`${frame+1} / ${maxFrames}`;document.querySelectorAll(".caption[data-start]").forEach(node=>node.classList.toggle("active",frame>=Number(node.dataset.start)&&frame<Number(node.dataset.end)));renderViews()}
    function debugBounds(view){const minimum=new THREE.Vector3(Infinity,Infinity,Infinity),maximum=new THREE.Vector3(-Infinity,-Infinity,-Infinity),position=new THREE.Vector3(),attribute=body.geometry.getAttribute("position");for(let vertex=0;vertex<attribute.count;vertex++){position.fromBufferAttribute(attribute,vertex);view.mesh.applyBoneTransform(vertex,position);view.mesh.localToWorld(position);minimum.min(position);maximum.max(position)}return{minimum:minimum.toArray(),maximum:maximum.toArray()}}
    globalThis.__motiusGalleryDebug=()=>views.map(view=>{const root=new THREE.Vector3();view.bones[0].getWorldPosition(root);return{method:view.method.label,frame,translation:view.motion?Array.from(decodeFrame(view,frame).slice(0,3)):null,root:root.toArray(),camera:view.camera.position.toArray(),groundOffset:view.groundOffset,bounds:debugBounds(view)}});
    function searchable(item){return`${item.case_key||item.case_id} ${referenceValues(item).map(x=>typeof x==="string"?x:x.caption).join(" ")} ${Object.values(item.outputs||{}).join(" ")}`.toLowerCase()}
    function renderCaseIndex(){const list=$("#case-list");list.replaceChildren(...filtered.map(i=>{const item=manifest.cases[i],button=document.createElement("button");button.type="button";button.className="case-button";button.dataset.index=i;button.innerHTML=`<span class="case-number">${String(i+1).padStart(4,"0")}</span><span class="case-name"></span>`;button.querySelector(".case-name").textContent=item.sample_id||item.case_id;button.addEventListener("click",()=>choose(filtered.indexOf(i)));return button}));const select=$("#case-select");select.replaceChildren(...filtered.map(i=>{const option=document.createElement("option");option.value=i;option.textContent=`${i+1}. ${manifest.cases[i].sample_id||manifest.cases[i].case_id}`;return option}));$("#case-summary").textContent=`${filtered.length.toLocaleString()} / ${manifest.population.toLocaleString()} cases`}
    function applyFilter(){const query=$("#search").value.trim().toLowerCase();filtered=manifest.cases.map((_,i)=>i).filter(i=>!query||searchable(manifest.cases[i]).includes(query));renderCaseIndex();choose(0)}
    function animate(time){if(playing&&time-lastTime>=1000/(views[0]?.motion?.descriptor.fps||30)){frame=(frame+1)%maxFrames;lastTime=time;updateAll()}else renderViews();requestAnimationFrame(animate)}
    async function init(){const response=await fetch("manifest.json",{cache:"force-cache"});if(!response.ok)throw new Error(`Manifest ${response.status}`);manifest=await response.json();if(manifest.representation!=="smpl_motion135")throw new Error(`Expected SMPL motion135 assets, got ${manifest.representation||"legacy joints"}`);body=await loadBody();filtered=manifest.cases.map((_,i)=>i);renderCaseIndex();const requested=new URLSearchParams(location.search).get("case"),start=Math.max(0,manifest.cases.findIndex(item=>(item.case_key||item.case_id)===requested||item.sample_id===requested));await choose(filtered.indexOf(start));requestAnimationFrame(animate)}
    $("#search").addEventListener("input",applyFilter);$("#case-select").addEventListener("change",event=>choose(filtered.indexOf(Number(event.target.value))));$("#previous").addEventListener("click",()=>choose(selected-1));$("#next").addEventListener("click",()=>choose(selected+1));$("#play").addEventListener("click",()=>{playing=!playing;$("#play").textContent=playing?"Ⅱ":"▶"});$("#timeline").addEventListener("input",event=>{frame=Number(event.target.value);updateAll()});addEventListener("resize",renderViews);main.addEventListener("scroll",renderViews,{passive:true});
    init().catch(error=>{loading.hidden=false;loading.textContent=error.message;console.error(error)});
  </script>
</body>
</html>
