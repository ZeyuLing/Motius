<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Motius SMPL comparison</title>
  <style>
    :root{color-scheme:light;--ink:#15201c;--muted:#66736d;--line:#d7dfdb;--paper:#fff;--wash:#eef2f0;--accent:#087d72;--header:72px}
    *{box-sizing:border-box}html,body{height:100%;margin:0}body{overflow:hidden;color:var(--ink);background:var(--wash);font:14px/1.45 ui-sans-serif,system-ui,sans-serif;letter-spacing:0}
    button,input,select{font:inherit;letter-spacing:0}.app{height:100%;display:grid;grid-template-rows:var(--header) minmax(0,1fr)}
    .topbar{display:grid;grid-template-columns:minmax(260px,1fr) auto auto minmax(190px,auto) minmax(300px,auto);gap:10px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--paper)}
    .search,input,select,.icon{height:38px;border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--ink)}input,select{width:100%;padding:0 11px}.icon{width:38px;display:grid;place-items:center;cursor:pointer;font-size:17px}.icon:hover{border-color:var(--accent);color:var(--accent)}
    .playback{display:grid;grid-template-columns:38px minmax(140px,260px) 82px;gap:9px;align-items:center}.playback input{height:22px;padding:0;accent-color:var(--accent)}.frame{color:var(--muted);font:12px ui-monospace,monospace;text-align:right}
    .workspace{min-height:0;display:grid;grid-template-columns:260px minmax(0,1fr)}
    .case-panel{min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr);border-right:1px solid var(--line);background:var(--paper)}.case-summary{padding:12px 14px;border-bottom:1px solid var(--line);color:var(--muted);font:12px ui-monospace,monospace}.case-list{overflow:auto;padding:6px}.case-button{width:100%;display:grid;grid-template-columns:56px minmax(0,1fr);gap:8px;padding:9px 8px;border:0;border-left:3px solid transparent;background:transparent;text-align:left;cursor:pointer}.case-button:hover{background:#f2f6f4}.case-button.active{border-left-color:var(--accent);background:#e9f4f1}.case-number{color:var(--muted);font:11px ui-monospace,monospace}.case-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:650}
    .main{min-height:0;overflow:auto}.case-head{position:sticky;top:0;z-index:5;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:18px;padding:15px 20px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.96);backdrop-filter:blur(10px)}.eyebrow{color:var(--accent);font:700 11px ui-monospace,monospace;text-transform:uppercase}.case-head h1{margin:2px 0 5px;font-size:22px;line-height:1.2}.captions{display:flex;flex-wrap:wrap;gap:6px}.caption{padding:4px 7px;border:1px solid var(--line);border-radius:3px;color:#42504a;background:#f8faf9}.caption.active{border-color:var(--accent);color:var(--ink);background:#e9f4f1}.loading{align-self:center;color:var(--muted);font:12px ui-monospace,monospace}
    .gallery-wrap{padding:16px 18px 28px}.gallery{position:relative;display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:12px}.render-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}.tile{position:relative;z-index:1;height:300px;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:transparent;box-shadow:0 3px 12px rgba(19,34,28,.06)}.tile-head{position:absolute;top:0;left:0;right:0;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:8px;height:38px;padding:0 10px;border-bottom:1px solid rgba(215,223,219,.88);background:rgba(255,255,255,.9);backdrop-filter:blur(7px)}.method{display:flex;align-items:center;gap:8px;font-weight:750}.swatch{width:4px;height:17px;border-radius:2px}.motion-meta{color:var(--muted);font:11px ui-monospace,monospace}.viewport{position:absolute;inset:38px 0 0}.output-text{position:absolute;left:9px;right:9px;bottom:9px;z-index:2;padding:7px 9px;border:1px solid rgba(255,255,255,.74);border-radius:4px;background:rgba(255,255,255,.88);backdrop-filter:blur(6px);color:#394740;font-size:12px}.text-tile{height:160px;background:#fff}.text-tile .tile-head{position:relative}.text-result{padding:58px 16px 16px;color:#25332d;font-size:15px;line-height:1.55}
    @media(max-width:1100px){:root{--header:126px}.topbar{grid-template-columns:minmax(0,1fr) auto auto minmax(180px,auto)}.playback{grid-column:1/-1;grid-template-columns:38px minmax(0,1fr) 76px}}
    @media(max-width:820px){.workspace{grid-template-columns:1fr}.case-panel{display:none}.gallery{grid-template-columns:1fr}.tile{height:340px}.case-head{position:relative}}
  </style>
  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js"}}</script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <input class="search" id="search" type="search" placeholder="Search case ID or caption" aria-label="Search cases">
      <button class="icon" id="previous" type="button" title="Previous case" aria-label="Previous case">‹</button>
      <button class="icon" id="next" type="button" title="Next case" aria-label="Next case">›</button>
      <select id="case-select" aria-label="Selected case"></select>
      <div class="playback">
        <button class="icon" id="play" type="button" title="Play or pause" aria-label="Play or pause">Ⅱ</button>
        <input id="timeline" type="range" min="0" max="1" value="0" aria-label="Animation frame">
        <span class="frame" id="frame">0 / 0</span>
      </div>
    </header>
    <div class="workspace">
      <aside class="case-panel"><div class="case-summary" id="case-summary">Loading cases</div><div class="case-list" id="case-list"></div></aside>
      <main class="main" id="main">
        <section class="case-head"><div><div class="eyebrow" id="position">Complete evaluation population</div><h1 id="case-id">Loading</h1><div class="captions" id="captions"></div></div><div class="loading" id="loading">Loading SMPL motions</div></section>
        <div class="gallery-wrap"><div class="gallery" id="gallery"><canvas class="render-canvas" id="canvas"></canvas></div></div>
      </main>
    </div>
  </div>
  <script type="module">
    import * as THREE from "three";

    const $=selector=>document.querySelector(selector);
    const canvas=$("#canvas"),gallery=$("#gallery"),main=$("#main"),loading=$("#loading");
    const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));renderer.shadowMap.enabled=true;renderer.outputColorSpace=THREE.SRGBColorSpace;
    const assetCache=new Map();let manifest,body,filtered=[],selected=0,views=[],frame=0,playing=true,lastTime=0,maxFrames=1,loadGeneration=0;

    function url(path,base){return new URL(path,base||location.href).href}
    async function fetchBuffer(path){if(assetCache.has(path)){const hit=assetCache.get(path);assetCache.delete(path);assetCache.set(path,hit);return hit}const pending=fetch(path).then(r=>{if(!r.ok)throw new Error(`${r.status} ${path}`);return r.arrayBuffer()});assetCache.set(path,pending);while(assetCache.size>96)assetCache.delete(assetCache.keys().next().value);return pending}
    async function loadBody(){const base=url(manifest.body_model_url||"smpl_model/",location.href);const meta=await fetch(url("model.json",base)).then(r=>r.json());const files=meta.files;const [vb,jb,fb,ib,wb]=await Promise.all([files.vertices,files.joints,files.faces,files.skin_indices,files.skin_weights].map(name=>fetchBuffer(url(name,base))));const positions=new Float32Array(vb),joints=new Float32Array(jb),faces=new Uint16Array(fb),indices=new Uint8Array(ib),weights=new Uint16Array(wb);const geometry=new THREE.BufferGeometry();geometry.setAttribute("position",new THREE.BufferAttribute(positions,3));geometry.setAttribute("skinIndex",new THREE.Uint8BufferAttribute(indices,4));geometry.setAttribute("skinWeight",new THREE.Uint16BufferAttribute(weights,4,true));geometry.setIndex(new THREE.BufferAttribute(faces,1));geometry.computeVertexNormals();return{meta,geometry,joints,parents:meta.parents}}
    function buildSkinnedMesh(material){const bones=[];for(let i=0;i<body.meta.joints;i++){const bone=new THREE.Bone(),p=body.parents[i],j=i*3;if(p<0)bone.position.set(body.joints[j],body.joints[j+1],body.joints[j+2]);else{const q=p*3;bone.position.set(body.joints[j]-body.joints[q],body.joints[j+1]-body.joints[q+1],body.joints[j+2]-body.joints[q+2])}bones.push(bone)}for(let i=1;i<bones.length;i++)bones[body.parents[i]].add(bones[i]);const mesh=new THREE.SkinnedMesh(body.geometry,material);mesh.add(bones[0]);const skeleton=new THREE.Skeleton(bones);mesh.bind(skeleton);mesh.castShadow=true;mesh.receiveShadow=true;return{mesh,bones}}
    function makeView(method,index){const scene=new THREE.Scene();scene.background=new THREE.Color(index%2?0xf1f4f2:0xeef2f0);scene.fog=new THREE.Fog(scene.background,7,16);scene.add(new THREE.HemisphereLight(0xffffff,0x66746e,2.1));const key=new THREE.DirectionalLight(0xffffff,2.8);key.position.set(3,6,4);key.castShadow=true;scene.add(key);const floor=new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.MeshStandardMaterial({color:0xf8faf9,roughness:1}));floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);const grid=new THREE.GridHelper(20,40,0xa8b6af,0xd8dfdb);grid.position.y=.003;scene.add(grid);const material=new THREE.MeshStandardMaterial({color:method.key==="gt"?0xc28a32:0x2e78ad,roughness:.58,metalness:.02,skinning:true});const skinned=buildSkinnedMesh(material);scene.add(skinned.mesh);const camera=new THREE.PerspectiveCamera(38,1,.05,60);camera.position.set(2.55,2.15,4.05);camera.lookAt(0,.85,0);return{method,scene,camera,...skinned,motion:null,viewport:null}}
    function decodeMotion(buffer,descriptor){const trans=new Uint16Array(buffer,descriptor.translation_offset,descriptor.translation_count),rot=new Int16Array(buffer,descriptor.rotation_offset,descriptor.rotation_count);return{descriptor,trans,rot}}
    async function loadViewMotion(view,descriptor){const path=url(descriptor.asset,manifest.asset_base_url||location.href),buffer=await fetchBuffer(path);view.motion=decodeMotion(buffer,descriptor)}
    function rot6dQuaternion(values,base,out){const a1=new THREE.Vector3(values[base],values[base+2],values[base+4]).normalize();const a2=new THREE.Vector3(values[base+1],values[base+3],values[base+5]);a2.addScaledVector(a1,-a1.dot(a2)).normalize();const a3=new THREE.Vector3().crossVectors(a1,a2);const matrix=new THREE.Matrix4().set(a1.x,a2.x,a3.x,0,a1.y,a2.y,a3.y,0,a1.z,a2.z,a3.z,0,0,0,0,1);out.setFromRotationMatrix(matrix)}
    function updateView(view){if(!view.motion)return;const d=view.motion.descriptor,source=Math.min(frame/d.stride,d.frames-1),lo=Math.floor(source),hi=Math.min(lo+1,d.frames-1),alpha=source-lo;const t0=lo*3,t1=hi*3,min=d.translation_minimum,scale=d.translation_scale;const tx=THREE.MathUtils.lerp(min[0]+view.motion.trans[t0]*scale[0],min[0]+view.motion.trans[t1]*scale[0],alpha),ty=THREE.MathUtils.lerp(min[1]+view.motion.trans[t0+1]*scale[1],min[1]+view.motion.trans[t1+1]*scale[1],alpha),tz=THREE.MathUtils.lerp(min[2]+view.motion.trans[t0+2]*scale[2],min[2]+view.motion.trans[t1+2]*scale[2],alpha);const rotations=new Float32Array(132),r0=lo*132,r1=hi*132;for(let i=0;i<132;i++)rotations[i]=THREE.MathUtils.lerp(view.motion.rot[r0+i]/32767,view.motion.rot[r1+i]/32767,alpha);for(let joint=0;joint<22;joint++)rot6dQuaternion(rotations,joint*6,view.bones[joint].quaternion);for(let joint=22;joint<24;joint++)view.bones[joint].quaternion.identity();view.bones[0].position.set(body.joints[0]+tx,body.joints[1]+ty,body.joints[2]+tz);view.camera.position.set(tx+2.55,2.15,tz+4.05);view.camera.lookAt(tx,.85,tz);view.mesh.skeleton.update()}
    function resizeRenderer(){const width=gallery.clientWidth,height=gallery.clientHeight,dpr=renderer.getPixelRatio();if(canvas.width!==Math.round(width*dpr)||canvas.height!==Math.round(height*dpr))renderer.setSize(width,height,false)}
    function renderViews(){resizeRenderer();renderer.setScissorTest(true);const canvasRect=canvas.getBoundingClientRect();renderer.clear();for(const view of views){if(!view.viewport)continue;const rect=view.viewport.getBoundingClientRect(),left=rect.left-canvasRect.left,bottom=canvasRect.bottom-rect.bottom,width=rect.width,height=rect.height;if(rect.bottom<0||rect.top>innerHeight||width<=0||height<=0)continue;renderer.setViewport(left,bottom,width,height);renderer.setScissor(left,bottom,width,height);view.camera.aspect=width/height;view.camera.updateProjectionMatrix();renderer.render(view.scene,view.camera)}renderer.setScissorTest(false)}
    function renderTiles(item){gallery.querySelectorAll(".tile").forEach(node=>node.remove());views=manifest.motion_methods.map((method,index)=>makeView(method,index));for(const view of views){const tile=document.createElement("article");tile.className="tile";tile.innerHTML=`<div class="tile-head"><div class="method"><span class="swatch" style="background:${view.method.accent}"></span>${view.method.label}</div><span class="motion-meta"></span></div><div class="viewport"></div>`;const output=item.outputs?.[view.method.key];if(output){const text=document.createElement("div");text.className="output-text";text.textContent=output;tile.append(text)}gallery.append(tile);view.viewport=tile.querySelector(".viewport")}for(const method of manifest.output_methods||[]){const tile=document.createElement("article");tile.className="tile text-tile";tile.innerHTML=`<div class="tile-head"><div class="method"><span class="swatch" style="background:${method.accent}"></span>${method.label}</div></div><div class="text-result"></div>`;tile.querySelector(".text-result").textContent=item.outputs?.[method.key]||"No output";gallery.append(tile)}}
    function referenceValues(item){return item.segments||item.references||[]}
    function renderCaseMeta(item,index){$("#position").textContent=`Case ${index+1} of ${manifest.population}`;$("#case-id").textContent=item.sample_id||item.case_id;const refs=referenceValues(item);$("#captions").replaceChildren(...refs.map(value=>{const span=document.createElement("span");span.className="caption";span.textContent=typeof value==="string"?value:value.caption;if(typeof value!=="string"){span.dataset.start=value.start_frame;span.dataset.end=value.end_frame}return span}))}
    async function choose(index){if(!filtered.length)return;const generation=++loadGeneration;selected=Math.max(0,Math.min(index,filtered.length-1));const absolute=filtered[selected],item=manifest.cases[absolute];$("#case-select").value=String(absolute);document.querySelectorAll(".case-button").forEach(button=>button.classList.toggle("active",Number(button.dataset.index)===absolute));renderCaseMeta(item,absolute);renderTiles(item);loading.hidden=false;loading.textContent=`Loading 0 / ${views.length}`;let done=0;await Promise.all(views.map(async view=>{const descriptor=item.motions[view.method.key];if(!descriptor)return;await loadViewMotion(view,descriptor);done++;if(generation===loadGeneration)loading.textContent=`Loading ${done} / ${views.length}`}));if(generation!==loadGeneration)return;maxFrames=Math.max(1,...views.map(view=>view.motion?.descriptor.display_frames||1));frame=0;$("#timeline").max=maxFrames-1;loading.hidden=true;updateAll();history.replaceState(null,"",`?case=${encodeURIComponent(item.case_key||item.case_id)}`)}
    function updateAll(){for(const view of views)updateView(view);$("#timeline").value=frame;$("#frame").textContent=`${frame+1} / ${maxFrames}`;document.querySelectorAll(".caption[data-start]").forEach(node=>node.classList.toggle("active",frame>=Number(node.dataset.start)&&frame<Number(node.dataset.end)));renderViews()}
    function searchable(item){return`${item.case_key||item.case_id} ${referenceValues(item).map(x=>typeof x==="string"?x:x.caption).join(" ")} ${Object.values(item.outputs||{}).join(" ")}`.toLowerCase()}
    function renderCaseIndex(){const list=$("#case-list");list.replaceChildren(...filtered.map(i=>{const item=manifest.cases[i],button=document.createElement("button");button.type="button";button.className="case-button";button.dataset.index=i;button.innerHTML=`<span class="case-number">${String(i+1).padStart(4,"0")}</span><span class="case-name"></span>`;button.querySelector(".case-name").textContent=item.sample_id||item.case_id;button.addEventListener("click",()=>choose(filtered.indexOf(i)));return button}));const select=$("#case-select");select.replaceChildren(...filtered.map(i=>{const option=document.createElement("option");option.value=i;option.textContent=`${i+1}. ${manifest.cases[i].sample_id||manifest.cases[i].case_id}`;return option}));$("#case-summary").textContent=`${filtered.length.toLocaleString()} / ${manifest.population.toLocaleString()} cases`}
    function applyFilter(){const query=$("#search").value.trim().toLowerCase();filtered=manifest.cases.map((_,i)=>i).filter(i=>!query||searchable(manifest.cases[i]).includes(query));renderCaseIndex();choose(0)}
    function animate(time){if(playing&&time-lastTime>=1000/(views[0]?.motion?.descriptor.fps||30)){frame=(frame+1)%maxFrames;lastTime=time;updateAll()}else renderViews();requestAnimationFrame(animate)}
    async function init(){const response=await fetch("manifest.json",{cache:"no-store"});if(!response.ok)throw new Error(`Manifest ${response.status}`);manifest=await response.json();if(manifest.representation!=="smpl_motion135")throw new Error(`Expected SMPL motion135 assets, got ${manifest.representation||"legacy joints"}`);body=await loadBody();filtered=manifest.cases.map((_,i)=>i);renderCaseIndex();const requested=new URLSearchParams(location.search).get("case"),start=Math.max(0,manifest.cases.findIndex(item=>(item.case_key||item.case_id)===requested||item.sample_id===requested));await choose(filtered.indexOf(start));requestAnimationFrame(animate)}
    $("#search").addEventListener("input",applyFilter);$("#case-select").addEventListener("change",event=>choose(filtered.indexOf(Number(event.target.value))));$("#previous").addEventListener("click",()=>choose(selected-1));$("#next").addEventListener("click",()=>choose(selected+1));$("#play").addEventListener("click",()=>{playing=!playing;$("#play").textContent=playing?"Ⅱ":"▶"});$("#timeline").addEventListener("input",event=>{frame=Number(event.target.value);updateAll()});addEventListener("resize",renderViews);main.addEventListener("scroll",renderViews,{passive:true});
    init().catch(error=>{loading.hidden=false;loading.textContent=error.message;console.error(error)});
  </script>
</body>
</html>
